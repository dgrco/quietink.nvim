# Quietink (dark) for Alacritty
# Place under: ~/.config/alacritty/themes/quietink-dark.toml
# Then in alacritty.toml: [general] import = ["~/.config/alacritty/themes/quietink-dark.toml"]

[colors.primary]
background = "#121212"
foreground = "#d2d2cb"
dim_foreground = "#9b9b8d"
bright_foreground = "#efefeb"

[colors.cursor]
text = "#121212"
cursor = "#d2d2cb"

[colors.vi_mode_cursor]
text = "#121212"
cursor = "#efefeb"

[colors.selection]
text = "CellForeground"
background = "#262626"

[colors.search.matches]
foreground = "#121212"
background = "#cdac78"

[colors.search.focused_match]
foreground = "#121212"
background = "#efefeb"

[colors.hints.start]
foreground = "#121212"
background = "#cdac78"

[colors.hints.end]
foreground = "#121212"
background = "#9b9b8d"

[colors.normal]
black = "#0a0a0a"
red = "#cb8078"
green = "#96b990"
yellow = "#cdac78"
blue = "#97adc5"
magenta = "#a6b5c5"
cyan = "#93a493"
white = "#d2d2cb"

[colors.bright]
black = "#9b9b8d"
red = "#cb8078"
green = "#96b990"
yellow = "#cdac78"
blue = "#97adc5"
magenta = "#a6b5c5"
cyan = "#93a493"
white = "#efefeb"

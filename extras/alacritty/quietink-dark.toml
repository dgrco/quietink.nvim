# Quietink (dark) for Alacritty
# Place under: ~/.config/alacritty/themes/quietink-dark.toml
# Then in alacritty.toml: [general] import = ["~/.config/alacritty/themes/quietink-dark.toml"]

[colors.primary]
background = "#121212"
foreground = "#c4c4c0"
dim_foreground = "#8a8a84"
bright_foreground = "#e8e8e2"

[colors.cursor]
text = "#121212"
cursor = "#c4c4c0"

[colors.vi_mode_cursor]
text = "#121212"
cursor = "#e8e8e2"

[colors.selection]
text = "CellForeground"
background = "#262626"

[colors.search.matches]
foreground = "#121212"
background = "#c2a06a"

[colors.search.focused_match]
foreground = "#121212"
background = "#e8e8e2"

[colors.hints.start]
foreground = "#121212"
background = "#c2a06a"

[colors.hints.end]
foreground = "#121212"
background = "#8a8a84"

[colors.normal]
black = "#0a0a0a"
red = "#c0726a"
green = "#8aab84"
yellow = "#c2a06a"
blue = "#8aa0b8"
magenta = "#9aa8b8"
cyan = "#8a948a"
white = "#c4c4c0"

[colors.bright]
black = "#8a8a84"
red = "#c0726a"
green = "#8aab84"
yellow = "#c2a06a"
blue = "#8aa0b8"
magenta = "#9aa8b8"
cyan = "#8a948a"
white = "#e8e8e2"

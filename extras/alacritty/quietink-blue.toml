# Quietink (blue) for Alacritty
# Place under: ~/.config/alacritty/themes/quietink-blue.toml
# Then in alacritty.toml: [general] import = ["~/.config/alacritty/themes/quietink-blue.toml"]

[colors.primary]
background = "#10131a"
foreground = "#c9cfd9"
dim_foreground = "#868f9f"
bright_foreground = "#eef1f7"

[colors.cursor]
text = "#10131a"
cursor = "#9b9b8d"

[colors.vi_mode_cursor]
text = "#10131a"
cursor = "#bbd5f4"

[colors.selection]
text = "CellForeground"
background = "#212835"

[colors.search.matches]
foreground = "#10131a"
background = "#cdac78"

[colors.search.focused_match]
foreground = "#10131a"
background = "#bbd5f4"

[colors.hints.start]
foreground = "#10131a"
background = "#cdac78"

[colors.hints.end]
foreground = "#10131a"
background = "#868f9f"

[colors.normal]
black = "#0b0d12"
red = "#cb8078"
green = "#8fb9ab"
yellow = "#cdac78"
blue = "#8fb5df"
magenta = "#adbbcc"
cyan = "#88a1c0"
white = "#c9cfd9"

[colors.bright]
black = "#868f9f"
red = "#cb8078"
green = "#8fb9ab"
yellow = "#cdac78"
blue = "#8fb5df"
magenta = "#adbbcc"
cyan = "#88a1c0"
white = "#eef1f7"

# Quietink (light) for Alacritty
# Place under: ~/.config/alacritty/themes/quietink-light.toml
# Then in alacritty.toml: [general] import = ["~/.config/alacritty/themes/quietink-light.toml"]

[colors.primary]
background = "#f4f2ec"
foreground = "#312e24"
dim_foreground = "#6b654e"
bright_foreground = "#1a1a15"

[colors.cursor]
text = "#f4f2ec"
cursor = "#9b9b8d"

[colors.vi_mode_cursor]
text = "#f4f2ec"
cursor = "#2a3426"

[colors.selection]
text = "CellForeground"
background = "#dcd8cb"

[colors.search.matches]
foreground = "#f4f2ec"
background = "#7d5417"

[colors.search.focused_match]
foreground = "#f4f2ec"
background = "#2a3426"

[colors.hints.start]
foreground = "#f4f2ec"
background = "#7d5417"

[colors.hints.end]
foreground = "#f4f2ec"
background = "#6b654e"

[colors.normal]
black = "#fbfaf6"
red = "#97352e"
green = "#33713f"
yellow = "#7d5417"
blue = "#346088"
magenta = "#344b5d"
cyan = "#3e5d47"
white = "#312e24"

[colors.bright]
black = "#6b654e"
red = "#97352e"
green = "#33713f"
yellow = "#7d5417"
blue = "#346088"
magenta = "#344b5d"
cyan = "#3e5d47"
white = "#1a1a15"

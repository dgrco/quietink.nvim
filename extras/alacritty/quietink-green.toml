# Quietink (green) for Alacritty
# Place under: ~/.config/alacritty/themes/quietink-green.toml
# Then in alacritty.toml: [general] import = ["~/.config/alacritty/themes/quietink-green.toml"]

[colors.primary]
background = "#10140f"
foreground = "#c9d4c4"
dim_foreground = "#8c9983"
bright_foreground = "#eef4ec"

[colors.cursor]
text = "#10140f"
cursor = "#9b9b8d"

[colors.vi_mode_cursor]
text = "#10140f"
cursor = "#c5e3bd"

[colors.selection]
text = "CellForeground"
background = "#202820"

[colors.search.matches]
foreground = "#10140f"
background = "#cdac78"

[colors.search.focused_match]
foreground = "#10140f"
background = "#c5e3bd"

[colors.hints.start]
foreground = "#10140f"
background = "#cdac78"

[colors.hints.end]
foreground = "#10140f"
background = "#8c9983"

[colors.normal]
black = "#0b0e0a"
red = "#cb8078"
green = "#9cbf8b"
yellow = "#cdac78"
blue = "#8bbc9b"
magenta = "#afc5a6"
cyan = "#8ab183"
white = "#c9d4c4"

[colors.bright]
black = "#8c9983"
red = "#cb8078"
green = "#9cbf8b"
yellow = "#cdac78"
blue = "#8bbc9b"
magenta = "#afc5a6"
cyan = "#8ab183"
white = "#eef4ec"

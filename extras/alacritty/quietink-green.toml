# Quietink (green) for Alacritty
# Place under: ~/.config/alacritty/themes/quietink-green.toml
# Then in alacritty.toml: [general] import = ["~/.config/alacritty/themes/quietink-green.toml"]

[colors.primary]
background = "#10140f"
foreground = "#bcc7b8"
dim_foreground = "#80887a"
bright_foreground = "#e6eee2"

[colors.cursor]
text = "#10140f"
cursor = "#bcc7b8"

[colors.vi_mode_cursor]
text = "#10140f"
cursor = "#bcdfb2"

[colors.selection]
text = "CellForeground"
background = "#202820"

[colors.search.matches]
foreground = "#10140f"
background = "#c2a06a"

[colors.search.focused_match]
foreground = "#10140f"
background = "#bcdfb2"

[colors.hints]
line_indicator = { foreground = "#80887a", background = "#161b14" }

[colors.hints.start]
foreground = "#10140f"
background = "#c2a06a"

[colors.hints.end]
foreground = "#10140f"
background = "#80887a"

[colors.normal]
black = "#0b0e0a"
red = "#c0726a"
green = "#8fb27f"
yellow = "#c2a06a"
blue = "#7fae8f"
magenta = "#a3b89a"
cyan = "#7ea378"
white = "#bcc7b8"

[colors.bright]
black = "#80887a"
red = "#c0726a"
green = "#8fb27f"
yellow = "#c2a06a"
blue = "#7fae8f"
magenta = "#a3b89a"
cyan = "#7ea378"
white = "#e6eee2"

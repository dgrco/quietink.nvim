# Quietink (dark) for foot
# Place under: ~/.config/foot/foot.ini
# Section must be named [colors-dark] or [colors-light] -- foot does not
# recognize a bare [colors] section. If you use foot's dark/light
# auto-switching, merge the relevant section(s) into one foot.ini.
# Colors are bare 6-digit hex, no '#' prefix -- this is foot's expected format.

[colors-dark]
alpha=1.0
foreground=efefeb
background=121212

cursor=121212 9b9b8d

regular0=0a0a0a   # black
regular1=cb8078   # red
regular2=96b990   # green
regular3=cdac78   # yellow
regular4=97adc5   # blue
regular5=a6b5c5   # magenta
regular6=93a493   # cyan
regular7=efefeb   # white

bright0=9b9b8d    # bright black
bright1=cb8078    # bright red
bright2=96b990    # bright green
bright3=cdac78    # bright yellow
bright4=97adc5    # bright blue
bright5=a6b5c5    # bright magenta
bright6=93a493    # bright cyan
bright7=efefeb    # bright white

selection-foreground=efefeb
selection-background=262626

# scrollback position indicator: fg bg
scrollback-indicator=9b9b8d 1a1a1a
# search box, no match: fg bg
search-box-no-match=121212 cb8078
# search box, match: fg bg
search-box-match=121212 cdac78
# URL highlight underline color
urls=97adc5

# Quietink (dark) for foot
# Place under: ~/.config/foot/foot.ini
# Section must be named [colors-dark] or [colors-light] -- foot does not
# recognize a bare [colors] section. If you use foot's dark/light
# auto-switching, merge the relevant section(s) into one foot.ini.
# Colors are bare 6-digit hex, no '#' prefix -- this is foot's expected format.

[colors-dark]
alpha=1.0
foreground=c4c4c0
background=121212

regular0=0a0a0a   # black
regular1=c0726a   # red
regular2=8aab84   # green
regular3=c2a06a   # yellow
regular4=8aa0b8   # blue
regular5=9aa8b8   # magenta
regular6=8a948a   # cyan
regular7=c4c4c0   # white

bright0=8a8a84    # bright black
bright1=c0726a    # bright red
bright2=8aab84    # bright green
bright3=c2a06a    # bright yellow
bright4=8aa0b8    # bright blue
bright5=9aa8b8    # bright magenta
bright6=8a948a    # bright cyan
bright7=e8e8e2    # bright white

selection-foreground=e8e8e2
selection-background=262626

# scrollback position indicator: fg bg
scrollback-indicator=8a8a84 1a1a1a
# search box, no match: fg bg
search-box-no-match=121212 c0726a
# search box, match: fg bg
search-box-match=121212 c2a06a
# URL highlight underline color
urls=8aa0b8

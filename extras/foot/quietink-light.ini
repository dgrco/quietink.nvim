# Quietink (light) for foot
# Place under: ~/.config/foot/foot.ini
# Section must be named [colors-dark] or [colors-light] -- foot does not
# recognize a bare [colors] section. If you use foot's dark/light
# auto-switching, merge the relevant section(s) into one foot.ini.
# Colors are bare 6-digit hex, no '#' prefix -- this is foot's expected format.

[colors-light]
alpha=1.0
foreground=312e24
background=f4f2ec

cursor=f4f2ec 9b9b8d

regular0=fbfaf6   # black
regular1=97352e   # red
regular2=33713f   # green
regular3=7d5417   # yellow
regular4=346088   # blue
regular5=344b5d   # magenta
regular6=3e5d47   # cyan
regular7=312e24   # white

bright0=6b654e    # bright black
bright1=97352e    # bright red
bright2=33713f    # bright green
bright3=7d5417    # bright yellow
bright4=346088    # bright blue
bright5=344b5d    # bright magenta
bright6=3e5d47    # bright cyan
bright7=1a1a15    # bright white

selection-foreground=1a1a15
selection-background=dcd8cb

# scrollback position indicator: fg bg
scrollback-indicator=6b654e ebe8df
# search box, no match: fg bg
search-box-no-match=f4f2ec 97352e
# search box, match: fg bg
search-box-match=f4f2ec 7d5417
# URL highlight underline color
urls=346088

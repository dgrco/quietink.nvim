# Quietink (light) for foot
# Place under: ~/.config/foot/foot.ini
# Section must be named [colors-dark] or [colors-light] -- foot does not
# recognize a bare [colors] section. If you use foot's dark/light
# auto-switching, merge the relevant section(s) into one foot.ini.
# Colors are bare 6-digit hex, no '#' prefix -- this is foot's expected format.

[colors-light]
alpha=1.0
foreground=3a382f
background=f4f2ec

regular0=fbfaf6   # black
regular1=a13f38   # red
regular2=3e7a4a   # green
regular3=8a5f1e   # yellow
regular4=3f6a92   # blue
regular5=3f5566   # magenta
regular6=4a6552   # cyan
regular7=3a382f   # white

bright0=726d5c    # bright black
bright1=a13f38    # bright red
bright2=3e7a4a    # bright green
bright3=8a5f1e    # bright yellow
bright4=3f6a92    # bright blue
bright5=3f5566    # bright magenta
bright6=4a6552    # bright cyan
bright7=201f1a    # bright white

selection-foreground=201f1a
selection-background=dcd8cb

# scrollback position indicator: fg bg
scrollback-indicator=726d5c ebe8df
# search box, no match: fg bg
search-box-no-match=f4f2ec a13f38
# search box, match: fg bg
search-box-match=f4f2ec 8a5f1e
# URL highlight underline color
urls=3f6a92

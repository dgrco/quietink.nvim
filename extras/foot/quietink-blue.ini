# Quietink (blue) for foot
# Place under: ~/.config/foot/foot.ini
# Section must be named [colors-dark] or [colors-light] -- foot does not
# recognize a bare [colors] section. If you use foot's dark/light
# auto-switching, merge the relevant section(s) into one foot.ini.
# Colors are bare 6-digit hex, no '#' prefix -- this is foot's expected format.

[colors-dark]
alpha=1.0
foreground=c9cfd9
background=10131a

regular0=0b0d12   # black
regular1=cb8078   # red
regular2=8fb9ab   # green
regular3=cdac78   # yellow
regular4=8fb5df   # blue
regular5=adbbcc   # magenta
regular6=88a1c0   # cyan
regular7=c9cfd9   # white

bright0=868f9f    # bright black
bright1=cb8078    # bright red
bright2=8fb9ab    # bright green
bright3=cdac78    # bright yellow
bright4=8fb5df    # bright blue
bright5=adbbcc    # bright magenta
bright6=88a1c0    # bright cyan
bright7=eef1f7    # bright white

selection-foreground=eef1f7
selection-background=212835

# scrollback position indicator: fg bg
scrollback-indicator=868f9f 161a22
# search box, no match: fg bg
search-box-no-match=10131a cb8078
# search box, match: fg bg
search-box-match=10131a cdac78
# URL highlight underline color
urls=8fb5df

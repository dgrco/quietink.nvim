# Quietink (blue) for foot
# Place under: ~/.config/foot/foot.ini
# Section must be named [colors-dark] or [colors-light] -- foot does not
# recognize a bare [colors] section. If you use foot's dark/light
# auto-switching, merge the relevant section(s) into one foot.ini.
# Colors are bare 6-digit hex, no '#' prefix -- this is foot's expected format.

[colors-dark]
alpha=1.0
foreground=bcc2cc
background=10131a

regular0=0b0d12   # black
regular1=c0726a   # red
regular2=83ab9e   # green
regular3=c2a06a   # yellow
regular4=7fa8d6   # blue
regular5=a0aebf   # magenta
regular6=7b94b3   # cyan
regular7=bcc2cc   # white

bright0=7d838f    # bright black
bright1=c0726a    # bright red
bright2=83ab9e    # bright green
bright3=c2a06a    # bright yellow
bright4=7fa8d6    # bright blue
bright5=a0aebf    # bright magenta
bright6=7b94b3    # bright cyan
bright7=e4e9f2    # bright white

selection-foreground=e4e9f2
selection-background=212835

# scrollback position indicator: fg bg
scrollback-indicator=7d838f 161a22
# search box, no match: fg bg
search-box-no-match=10131a c0726a
# search box, match: fg bg
search-box-match=10131a c2a06a
# URL highlight underline color
urls=7fa8d6

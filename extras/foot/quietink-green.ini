# Quietink (green) for foot
# Place under: ~/.config/foot/foot.ini
# Section must be named [colors-dark] or [colors-light] -- foot does not
# recognize a bare [colors] section. If you use foot's dark/light
# auto-switching, merge the relevant section(s) into one foot.ini.
# Colors are bare 6-digit hex, no '#' prefix -- this is foot's expected format.

[colors-dark]
alpha=1.0
foreground=bcc7b8
background=10140f

regular0=0b0e0a   # black
regular1=c0726a   # red
regular2=8fb27f   # green
regular3=c2a06a   # yellow
regular4=7fae8f   # blue
regular5=a3b89a   # magenta
regular6=7ea378   # cyan
regular7=bcc7b8   # white

bright0=80887a    # bright black
bright1=c0726a    # bright red
bright2=8fb27f    # bright green
bright3=c2a06a    # bright yellow
bright4=7fae8f    # bright blue
bright5=a3b89a    # bright magenta
bright6=7ea378    # bright cyan
bright7=e6eee2    # bright white

selection-foreground=e6eee2
selection-background=202820

# scrollback position indicator: fg bg
scrollback-indicator=80887a 161b14
# search box, no match: fg bg
search-box-no-match=10140f c0726a
# search box, match: fg bg
search-box-match=10140f c2a06a
# URL highlight underline color
urls=7fae8f

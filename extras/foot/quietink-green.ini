# Quietink (green) for foot
# Place under: ~/.config/foot/foot.ini
# Section must be named [colors-dark] or [colors-light] -- foot does not
# recognize a bare [colors] section. If you use foot's dark/light
# auto-switching, merge the relevant section(s) into one foot.ini.
# Colors are bare 6-digit hex, no '#' prefix -- this is foot's expected format.

[colors-dark]
alpha=1.0
foreground=c9d4c4
background=10140f

regular0=0b0e0a   # black
regular1=cb8078   # red
regular2=9cbf8b   # green
regular3=cdac78   # yellow
regular4=8bbc9b   # blue
regular5=afc5a6   # magenta
regular6=8ab183   # cyan
regular7=c9d4c4   # white

bright0=8c9983    # bright black
bright1=cb8078    # bright red
bright2=9cbf8b    # bright green
bright3=cdac78    # bright yellow
bright4=8bbc9b    # bright blue
bright5=afc5a6    # bright magenta
bright6=8ab183    # bright cyan
bright7=eef4ec    # bright white

selection-foreground=eef4ec
selection-background=202820

# scrollback position indicator: fg bg
scrollback-indicator=8c9983 161b14
# search box, no match: fg bg
search-box-no-match=10140f cb8078
# search box, match: fg bg
search-box-match=10140f cdac78
# URL highlight underline color
urls=8bbc9b
